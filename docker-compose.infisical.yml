# Infisical self-hosted — overlay onto rest/docker-compose.yml.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.infisical.yml up -d infisical
#
# Infisical shares the postgres and redis services from docker-compose.yml.
# It needs a separate DB created first:
#   docker compose exec postgres psql -U openclaw -c "CREATE DATABASE infisical;"

services:
    infisical:
        image: infisical/infisical:latest-postgres
        ports:
            - "8080:8080"
        environment:
            ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY}
            AUTH_SECRET: ${INFISICAL_AUTH_SECRET}
            DB_CONNECTION_URI: postgresql://openclaw:openclaw@postgres:5432/infisical
            REDIS_URL: redis://redis:6379/1
            SITE_URL: ${INFISICAL_SITE_URL:-http://localhost:8080}
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped
