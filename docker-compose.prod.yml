services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: openclaw
            POSTGRES_PASSWORD: openclaw
            POSTGRES_DB: openclaw
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U openclaw"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - default
            - openclaw-net

    meilisearch:
        image: getmeili/meilisearch:v1.13
        environment:
            MEILI_ENV: production
            MEILI_MASTER_KEY: openclaw-dev-key
        volumes:
            - meilisearch_data:/meili_data

    nats:
        image: nats:2-alpine
        command: ["-js"]
        networks:
            - default
            - openclaw-net

    qdrant:
        image: qdrant/qdrant:v1.17.1
        volumes:
            - qdrant_data:/qdrant/storage

    garage:
        image: dxflrs/garage:v1.0.1
        volumes:
            - ./garage.toml:/etc/garage.toml:ro
            - garage_meta:/var/lib/garage/meta
            - garage_data:/var/lib/garage/data

    rag:
        build: ../rag
        environment:
            RAG_QDRANT_URL: http://qdrant:6333
            RAG_QDRANT_COLLECTION: chunks
            RAG_HOST: 0.0.0.0
            RAG_PORT: "8001"
            RAG_EMBEDDING_URL: ${LITELLM_URL:-http://litellm:4000/v1}
        env_file: .env
        depends_on:
            - qdrant
        networks:
            - default
            - openclaw-net
        restart: unless-stopped

    parser:
        build: ../parser
        environment:
            PARSER_NATS_URL: nats://nats:4222
            S3_ENDPOINT_URL: http://garage:3900
            PARSER_QDRANT_URL: http://qdrant:6333
            PARSER_SPEACHES_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
            PARSER_SPEACHES_MODEL: whisper
            PARSER_SPEACHES_API_KEY: ${LITELLM_API_KEY:-sk-local-dev}
            PARSER_EMBEDDING_URL: ${LITELLM_URL:-http://litellm:4000/v1}
        env_file: .env
        depends_on:
            - nats
            - qdrant
            - garage
        networks:
            - default
            - openclaw-net
        restart: unless-stopped

    mcp:
        build: ../mcp
        container_name: mcp
        environment:
            MCP_REST_URL: http://api:8000/v1
            MCP_REDIS_URL: redis://redis:6379/0
            MCP_HOST: 0.0.0.0
            MCP_PORT: "8002"
        env_file: .env
        depends_on:
            - api
            - redis
        networks:
            - default
            - openclaw-net
        restart: unless-stopped

    api:
        build: .
        env_file: .env
        environment:
            DATABASE_URL: postgresql+asyncpg://openclaw:openclaw@postgres:5432/openclaw
            REDIS_URL: redis://redis:6379/0
            MEILISEARCH_URL: http://meilisearch:7700
            NATS_URL: nats://nats:4222
            S3_ENDPOINT_URL: http://garage:3900
            RAG_SERVICE_URL: http://rag:8001
            GOCLAW_GATEWAY_URL: http://goclaw:18790
            GOCLAW_LITELLM_URL: http://litellm:4000/v1
            SHELL_SERVICE_URL: http://shell-shell-1:18080
            CORS_ORIGINS: https://asuclaw.rmnw-panel.ru
        volumes:
            - ../skills:/skills:ro
            - ./agent-files:/app/agent-files:ro
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            meilisearch:
                condition: service_started
            nats:
                condition: service_started
            garage:
                condition: service_started
            qdrant:
                condition: service_started
        networks:
            - default
            - openclaw-net
        restart: unless-stopped

volumes:
    postgres_data:
    redis_data:
    meilisearch_data:
    garage_meta:
    garage_data:
    qdrant_data:

networks:
    openclaw-net:
        external: true
